<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Catalog</title>
  <link rel="preconnect" href="https://media.rawg.io" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <h1>Game Catalog</h1>
      <button id="keyBtn" class="ghost-btn" title="Set RAWG API key">API key</button>
    </div>
    <div id="stats" class="stats" aria-live="polite"></div>
  </header>

  <div id="enrichBar" class="enrich-bar hidden">
    <span id="enrichText">Fetching cover art…</span>
    <div class="enrich-track"><div id="enrichFill" class="enrich-fill"></div></div>
  </div>

  <section class="controls">
    <input id="search" class="search" type="search" placeholder="Search titles…" autocomplete="off" />

    <label class="ctl">
      <span>Sort</span>
      <select id="sort">
        <option value="date-desc">Completed · newest</option>
        <option value="date-asc">Completed · oldest</option>
        <option value="title-asc">Title · A–Z</option>
        <option value="title-desc">Title · Z–A</option>
        <option value="year-desc">Release year · newest</option>
        <option value="year-asc">Release year · oldest</option>
        <option value="rating-desc">Rating · high–low</option>
        <option value="hours-desc">Hours · high–low</option>
      </select>
    </label>

    <label class="ctl">
      <span>Platform</span>
      <select id="platform"><option value="">All</option></select>
    </label>

    <label class="ctl">
      <span>Genre</span>
      <select id="genre"><option value="">All</option></select>
    </label>

    <label class="ctl">
      <span>Year</span>
      <select id="year"><option value="">All</option></select>
    </label>

    <div class="view-toggle" role="group" aria-label="View">
      <button id="gridViewBtn" aria-pressed="false">Grid</button>
      <button id="tableViewBtn" class="active" aria-pressed="true">Table</button>
    </div>

    <button id="resetBtn" class="ghost-btn">Reset</button>
  </section>

  <main>
    <p id="resultCount" class="result-count"></p>
    <div id="grid" class="grid"></div>
    <div id="tableWrap" class="table-wrap hidden">
      <table id="table">
        <thead>
          <tr>
            <th data-sort="title">Title</th>
            <th data-sort="studio">Studio</th>
            <th data-sort="platform">Platform</th>
            <th data-sort="genre">Genre</th>
            <th data-sort="year">Released</th>
            <th data-sort="date">Completed</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <p id="empty" class="empty hidden">No games match your filters.</p>
  </main>

  <footer class="site-footer">
    <span>Cover art &amp; metadata from <a href="https://rawg.io" target="_blank" rel="noopener">RAWG</a>.</span>
  </footer>

  <script src="js/rawg.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
